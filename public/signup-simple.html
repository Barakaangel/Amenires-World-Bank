<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Amenires World Bank</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      padding: 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 600;
      font-size: 14px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-group input.error {
      border-color: #dc3545;
    }

    .error-message {
      color: #dc3545;
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .divider {
      text-align: center;
      margin: 30px 0;
      color: #999;
      font-size: 14px;
    }

    .divider::before,
    .divider::after {
      content: '';
      display: inline-block;
      width: 30%;
      height: 1px;
      background: #ddd;
      vertical-align: middle;
      margin: 0 10px;
    }

    .login-link {
      text-align: center;
      margin-top: 20px;
    }

    .login-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .helper-text {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏦 Create Account</h1>
      <p>Join Amenires World Bank today</p>
    </div>

    <div class="alert alert-error" id="alert"></div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Creating your account...</p>
    </div>

    <form id="signupForm" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label for="fullName">Full Name *</label>
        <input type="text" id="fullName" name="fullName" placeholder="John Doe" required>
        <small class="error-message" id="fullName-error"></small>
      </div>

      <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" name="email" placeholder="john@example.com" required>
        <small class="error-message" id="email-error"></small>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number *</label>
        <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567" required>
        <small class="helper-text">Include country code, e.g., +1, +86</small>
        <small class="error-message" id="phone-error"></small>
      </div>

      <div class="form-group">
        <label for="accountType">Account Type *</label>
        <select id="accountType" name="accountType" required>
          <option value="">Select account type</option>
          <option value="personal">Personal Account</option>
          <option value="business">Business Account</option>
          <option value="student">Student Account</option>
          <option value="senior">Senior Account</option>
        </select>
        <small class="error-message" id="accountType-error"></small>
      </div>

      <div class="form-group">
        <label for="country">Country *</label>
        <select id="country" name="country" required>
          <option value="">Select your country</option>
          <option value="US">United States</option>
          <option value="UK">United Kingdom</option>
          <option value="CA">Canada</option>
          <option value="AU">Australia</option>
          <option value="DE">Germany</option>
          <option value="FR">France</option>
          <option value="CN">China</option>
          <option value="IN">India</option>
          <option value="JP">Japan</option>
          <option value="BR">Brazil</option>
          <option value="other">Other</option>
        </select>
        <small class="error-message" id="country-error"></small>
      </div>

      <div class="form-group">
        <label for="currency">Currency *</label>
        <select id="currency" name="currency" required>
          <option value="USD">USD - US Dollar</option>
          <option value="EUR">EUR - Euro</option>
          <option value="GBP">GBP - British Pound</option>
          <option value="CAD">CAD - Canadian Dollar</option>
          <option value="AUD">AUD - Australian Dollar</option>
          <option value="CNY">CNY - Chinese Yuan</option>
          <option value="JPY">JPY - Japanese Yen</option>
          <option value="INR">INR - Indian Rupee</option>
          <option value="BRL">BRL - Brazilian Real</option>
        </select>
        <small class="error-message" id="currency-error"></small>
      </div>

      <div class="form-group">
        <label for="password">Password *</label>
        <input type="password" id="password" name="password" placeholder="Create a strong password" required minlength="8">
        <small class="helper-text">Minimum 8 characters with letters, numbers, and symbols</small>
        <small class="error-message" id="password-error"></small>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password *</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required>
        <small class="error-message" id="confirmPassword-error"></small>
      </div>

      <button type="submit" class="btn" id="signupBtn">Create Account</button>
    </form>

    <div class="divider">or</div>

    <div class="login-link">
      Already have an account? <a href="login.html">Sign In</a>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000/api';

    function showAlert(message, type = 'error') {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = `alert alert-${type} show`;
      
      setTimeout(() => {
        alert.classList.remove('show');
      }, 5000);
    }

    function hideAlert() {
      const alert = document.getElementById('alert');
      alert.classList.remove('show');
    }

    function showFieldError(fieldId, message) {
      const field = document.getElementById(fieldId);
      const errorEl = document.getElementById(`${fieldId}-error`);
      
      if (field) field.classList.add('error');
      if (errorEl) {
        errorEl.textContent = message;
        errorEl.classList.add('show');
      }
    }

    function clearFieldError(fieldId) {
      const field = document.getElementById(fieldId);
      const errorEl = document.getElementById(`${fieldId}-error`);
      
      if (field) field.classList.remove('error');
      if (errorEl) {
        errorEl.textContent = '';
        errorEl.classList.remove('show');
      }
    }

    function setLoading(loading) {
      const loadingEl = document.getElementById('loading');
      const btn = document.getElementById('signupBtn');
      
      if (loading) {
        loadingEl.classList.add('show');
        btn.disabled = true;
        btn.textContent = 'Creating Account...';
      } else {
        loadingEl.classList.remove('show');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    async function handleSignup(event) {
      event.preventDefault();
      hideAlert();

      // Clear all errors
      ['fullName', 'email', 'phone', 'accountType', 'country', 'currency', 'password', 'confirmPassword'].forEach(clearFieldError);

      // Get values
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const accountType = document.getElementById('accountType').value;
      const country = document.getElementById('country').value;
      const currency = document.getElementById('currency').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Validate
      let hasError = false;

      if (!fullName) {
        showFieldError('fullName', 'Full name is required');
        hasError = true;
      }

      if (!email) {
        showFieldError('email', 'Email is required');
        hasError = true;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showFieldError('email', 'Please enter a valid email address');
        hasError = true;
      }

      if (!phone) {
        showFieldError('phone', 'Phone number is required');
        hasError = true;
      }

      if (!accountType) {
        showFieldError('accountType', 'Please select an account type');
        hasError = true;
      }

      if (!country) {
        showFieldError('country', 'Please select a country');
        hasError = true;
      }

      if (!currency) {
        showFieldError('currency', 'Please select a currency');
        hasError = true;
      }

      if (!password) {
        showFieldError('password', 'Password is required');
        hasError = true;
      } else if (password.length < 8) {
        showFieldError('password', 'Password must be at least 8 characters');
        hasError = true;
      }

      if (!confirmPassword) {
        showFieldError('confirmPassword', 'Please confirm your password');
        hasError = true;
      } else if (password !== confirmPassword) {
        showFieldError('confirmPassword', 'Passwords do not match');
        hasError = true;
      }

      if (hasError) {
        showAlert('Please fix the errors below', 'error');
        return;
      }

      // Split name
      const nameParts = fullName.split(' ');
      const firstName = nameParts[0] || fullName;
      const lastName = nameParts.slice(1).join(' ') || '';

      setLoading(true);

      try {
        const response = await fetch(`${API_BASE}/auth/signup`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            firstName,
            lastName,
            email,
            password,
            phone,
            country,
            accountType,
            currency
          })
        });

        const data = await response.json();
        setLoading(false);

        if (response.ok) {
          showAlert(`✅ Account created successfully! Redirecting to login...`, 'success');
          
          setTimeout(() => {
            window.location.href = `/login.html?email=${encodeURIComponent(email)}`;
          }, 2000);
        } else {
          showAlert(`❌ ${data.message || 'Failed to create account'}`, 'error');
        }
      } catch (error) {
        setLoading(false);
        showAlert(`❌ ${error.message}. Make sure the server is running on port 3000.`, 'error');
      }
    }

    // Add real-time validation
    document.querySelectorAll('input, select').forEach(field => {
      field.addEventListener('blur', function() {
        if (this.value.trim()) {
          clearFieldError(this.id);
        }
      });
    });
  </script>
</body>
</html>
