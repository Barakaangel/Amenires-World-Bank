<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amenires World Bank - Secure Banking</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 450px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header i {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .tabs {
      display: flex;
      background: #f8f9fa;
      border-bottom: 2px solid #e9ecef;
    }

    .tab {
      flex: 1;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      font-weight: 600;
      color: #666;
      transition: all 0.3s;
      background: none;
      border: none;
      font-size: 16px;
    }

    .tab:hover {
      background: #e9ecef;
    }

    .tab.active {
      color: #667eea;
      border-bottom: 3px solid #667eea;
      background: white;
    }

    .form-container {
      padding: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e9ecef;
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-group input::placeholder {
      color: #aaa;
    }

    .password-group {
      position: relative;
    }

    .password-group i {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      cursor: pointer;
    }

    .button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .button:active {
      transform: translateY(0);
    }

    .button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .button .spinner {
      display: none;
      margin-right: 8px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .button.loading .spinner {
      display: inline-block;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 25px 0;
      color: #999;
      font-size: 14px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e9ecef;
    }

    .divider span {
      padding: 0 15px;
    }

    .social-login {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    .social-btn {
      flex: 1;
      padding: 12px;
      border: 2px solid #e9ecef;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .social-btn:hover {
      border-color: #667eea;
      background: #f8f9fa;
    }

    .social-btn i {
      font-size: 20px;
    }

    .social-btn.google i { color: #ea4335; }
    .social-btn.facebook i { color: #1877f2; }
    .social-btn.apple i { color: #000; }

    .alert {
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: none;
      font-size: 14px;
    }

    .alert.show {
      display: block;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .alert.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .alert.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .alert.warning {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeaa7;
    }

    .alert.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    .alert i {
      margin-right: 8px;
    }

    .hidden {
      display: none;
    }

    .terms {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin-top: 15px;
    }

    .terms a {
      color: #667eea;
      text-decoration: none;
    }

    .terms a:hover {
      text-decoration: underline;
    }

    .footer {
      text-align: center;
      padding: 20px;
      background: #f8f9fa;
      font-size: 12px;
      color: #999;
    }

    .footer a {
      color: #667eea;
      text-decoration: none;
    }

    .security-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-size: 12px;
      color: #28a745;
      margin-top: 10px;
    }

    .security-badge i {
      font-size: 14px;
    }

    /* Form styles for different views */
    .form-view {
      display: none;
    }

    .form-view.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 500px) {
      .container {
        border-radius: 0;
      }
      
      body {
        padding: 0;
      }
    }

    /* Validation styles */
    .form-group.error input {
      border-color: #dc3545;
    }

    .form-group.success input {
      border-color: #28a745;
    }

    .form-group small {
      color: #dc3545;
      font-size: 12px;
      display: none;
      margin-top: 5px;
    }

    .form-group.error small {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <i class="fas fa-university"></i>
      <h1>Amenires World Bank</h1>
      <p>Secure Banking, Trusted Service</p>
      <div class="security-badge">
        <i class="fas fa-shield-alt"></i>
        <span>256-bit SSL Encrypted</span>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
      <button class="tab" onclick="switchTab('signup')">
        <i class="fas fa-user-plus"></i> Sign Up
      </button>
    </div>

    <!-- Alert Box -->
    <div class="alert" id="alertBox">
      <i class="fas fa-info-circle"></i>
      <span id="alertMessage"></span>
    </div>

    <!-- Login Form -->
    <div class="form-container" id="loginForm">
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input 
            type="email" 
            id="loginEmail" 
            placeholder="Enter your email" 
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="password-group">
            <input 
              type="password" 
              id="loginPassword" 
              placeholder="Enter your password" 
              required
              autocomplete="current-password"
            >
            <i class="fas fa-eye" onclick="togglePassword('loginPassword', this)"></i>
          </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <label style="display: flex; align-items: center; gap: 5px; font-size: 14px; color: #666;">
            <input type="checkbox"> Remember me
          </label>
          <a href="#" style="color: #667eea; text-decoration: none; font-size: 14px;">Forgot Password?</a>
        </div>

        <button type="submit" class="button" id="loginBtn">
          <span class="spinner fas fa-spinner"></span>
          <span>Sign In</span>
        </button>
      </form>

      <div class="divider">
        <span>Or continue with</span>
      </div>

      <div class="social-login">
        <button class="social-btn google" onclick="showAlert('Google login coming soon!', 'info')">
          <i class="fab fa-google"></i> Google
        </button>
        <button class="social-btn facebook" onclick="showAlert('Facebook login coming soon!', 'info')">
          <i class="fab fa-facebook-f"></i> Facebook
        </button>
      </div>
    </div>

    <!-- Signup Form -->
    <div class="form-container hidden" id="signupForm">
      <form onsubmit="handleSignup(event)">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input 
            type="text" 
            id="fullName" 
            placeholder="Enter your full name" 
            required
            autocomplete="name"
          >
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            placeholder="Enter your email" 
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input 
            type="tel" 
            id="phone" 
            placeholder="Enter your phone number" 
            required
            autocomplete="tel"
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-group">
            <input 
              type="password" 
              id="password" 
              placeholder="Create a strong password" 
              required
              minlength="8"
              autocomplete="new-password"
            >
            <i class="fas fa-eye" onclick="togglePassword('password', this)"></i>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-group">
            <input 
              type="password" 
              id="confirmPassword" 
              placeholder="Confirm your password" 
              required
              autocomplete="new-password"
            >
            <i class="fas fa-eye" onclick="togglePassword('confirmPassword', this)"></i>
          </div>
        </div>

        <label style="display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: #666; margin-bottom: 20px;">
          <input type="checkbox" required style="margin-top: 2px;">
          <span>I agree to the <a href="#" style="color: #667eea;">Terms of Service</a> and <a href="#" style="color: #667eea;">Privacy Policy</a></span>
        </label>

        <button type="submit" class="button" id="signupBtn">
          <span class="spinner fas fa-spinner"></span>
          <span>Create Account</span>
        </button>
      </form>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>© 2026 Amenires World Bank. All rights reserved.</p>
      <p>
        <a href="#">Privacy Policy</a> | 
        <a href="#">Terms of Service</a> | 
        <a href="#">Contact Us</a>
      </p>
    </div>
  </div>

  <script>
    // API Base URL
    const API_URL = 'http://localhost:3000/api';

    // Switch between login and signup tabs
    function switchTab(tab) {
      const tabs = document.querySelectorAll('.tab');
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');

      tabs.forEach(t => t.classList.remove('active'));

      if (tab === 'login') {
        tabs[0].classList.add('active');
        loginForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
      } else {
        tabs[1].classList.add('active');
        loginForm.classList.add('hidden');
        signupForm.classList.remove('hidden');
      }

      hideAlert();
    }

    // Toggle password visibility
    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }

    // Show alert message
    function showAlert(message, type = 'info') {
      const alertBox = document.getElementById('alertBox');
      const alertMessage = document.getElementById('alertMessage');
      
      alertBox.className = `alert ${type} show`;
      alertMessage.textContent = message;

      // Auto-hide after 5 seconds
      setTimeout(() => {
        hideAlert();
      }, 5000);
    }

    // Hide alert message
    function hideAlert() {
      const alertBox = document.getElementById('alertBox');
      alertBox.classList.remove('show');
    }

    // Set button loading state
    function setButtonLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.classList.toggle('loading', loading);
      btn.disabled = loading;
    }

    // Handle login
    async function handleLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      setButtonLoading('loginBtn', true);

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ email, password }),
          credentials: 'include'
        });

        const data = await response.json();

        if (response.ok) {
          showAlert('Login successful! Redirecting...', 'success');
          
          // Store token
          if (data.token) {
            localStorage.setItem('token', data.token);
          }

          // Redirect to dashboard after 1 second
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1000);
        } else {
          showAlert(data.message || 'Login failed. Please try again.', 'error');
        }
      } catch (error) {
        console.error('Login error:', error);
        // For demo: Allow login with demo credentials
        if (email === 'admin@bank.com' && password === 'password123') {
          showAlert('Demo login successful! Redirecting...', 'success');
          localStorage.setItem('token', 'demo-token-' + Date.now());
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1000);
        } else {
          showAlert('Connection error. Make sure the server is running.', 'error');
        }
      } finally {
        setButtonLoading('loginBtn', false);
      }
    }

    // Handle signup
    async function handleSignup(event) {
      event.preventDefault();
      
      const fullName = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Validate passwords match
      if (password !== confirmPassword) {
        showAlert('Passwords do not match!', 'error');
        return;
      }

      // Validate password strength
      if (password.length < 8) {
        showAlert('Password must be at least 8 characters long!', 'error');
        return;
      }

      setButtonLoading('signupBtn', true);

      try {
        const response = await fetch(`${API_URL}/auth/signup`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ fullName, email, phone, password }),
          credentials: 'include'
        });

        const data = await response.json();

        if (response.ok) {
          showAlert('Account created successfully! Please login.', 'success');
          
          // Switch to login tab after 1.5 seconds
          setTimeout(() => {
            switchTab('login');
            document.getElementById('loginEmail').value = email;
          }, 1500);
        } else {
          showAlert(data.message || 'Signup failed. Please try again.', 'error');
        }
      } catch (error) {
        console.error('Signup error:', error);
        showAlert('Connection error. Make sure the server is running.', 'error');
      } finally {
        setButtonLoading('signupBtn', false);
      }
    }

    // Check if already logged in
    window.addEventListener('load', () => {
      const token = localStorage.getItem('token');
      if (token) {
        // User is logged in, redirect to dashboard
        // Uncomment this line to enable auto-redirect
        // window.location.href = '/dashboard.html';
      }
    });
  </script>
</body>
</html>
