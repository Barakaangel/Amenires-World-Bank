<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bankGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Bank Icon -->
  <g filter="url(#shadow)">
    <!-- Building Base -->
    <rect x="10" y="30" width="40" height="25" fill="url(#bankGradient)" rx="2"/>
    
    <!-- Building Columns -->
    <rect x="15" y="25" width="5" height="30" fill="#667eea"/>
    <rect x="25" y="25" width="5" height="30" fill="#764ba2"/>
    <rect x="35" y="25" width="5" height="30" fill="#667eea"/>
    
    <!-- Building Top -->
    <rect x="10" y="20" width="40" height="5" fill="url(#goldGradient)" rx="1"/>
    
    <!-- Door -->
    <rect x="27" y="40" width="6" height="15" fill="#ffffff" rx="1"/>
    <circle cx="32" cy="47" r="1.5" fill="#ffd700"/>
    
    <!-- Windows -->
    <rect x="13" y="35" width="4" height="4" fill="#ffffff" rx="0.5"/>
    <rect x="20" y="35" width="4" height="4" fill="#ffffff" rx="0.5"/>
    <rect x="13" y="43" width="4" height="4" fill="#ffffff" rx="0.5"/>
    <rect x="20" y="43" width="4" height="4" fill="#ffffff" rx="0.5"/>
    
    <!-- Dome -->
    <path d="M 10 20 Q 30 10 50 20 L 50 20 L 10 20 Z" fill="url(#goldGradient)"/>
    
    <!-- Flag -->
    <rect x="30" y="8" width="12" height="8" fill="#667eea"/>
    <line x1="30" y1="8" x2="30" y2="16" stroke="#ffd700" stroke-width="1"/>
  </g>

  <!-- Text -->
  <g font-family="'Segoe UI', 'Microsoft YaHei', sans-serif">
    <text x="60" y="25" font-size="12" font-weight="700" fill="#1a1a2e">AMENIRES</text>
    <text x="60" y="40" font-size="16" font-weight="300" fill="#667eea">WORLD BANK</text>
    <text x="60" y="52" font-size="8" font-weight="400" fill="#6c757d" letter-spacing="2">SECURE • TRUSTED • GLOBAL</text>
  </g>
</svg>
