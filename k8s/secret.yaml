apiVersion: v1
kind: Secret
metadata:
  name: bank-secrets
  labels:
    app: bank-api
type: Opaque
stringData:
  mongodb-uri: "mongodb://admin:adminpassword@mongodb-service:27017/bankdb?authSource=admin"
  mongodb-username: "admin"
  mongodb-password: "adminpassword"
  jwt-secret: "your-jwt-secret-change-this-in-production"
  encryption-key: "your-32-character-encryption-key"
  redis-password: ""
---
# Note: In production, create secrets using:
# kubectl create secret generic bank-secrets \
#   --from-literal=mongodb-uri='mongodb://...' \
#   --from-literal=jwt-secret='...' \
#   --from-literal=encryption-key='...'
